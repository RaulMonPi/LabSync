<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyotetris</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="wrap">
    <div id="game-shell">
      <div id="game"></div>

      <div id="hud-overlay" aria-label="Game HUD">
        <div class="hud-section hud-section-top">
          <div id="hud-next" class="hud-item hud-title">NEXT</div>
        </div>

        <div class="hud-section hud-section-bottom">
          <div id="hud-player" class="hud-item hud-player" title="Haz click para cambiar el nombre">
            PLAYER: Player
          </div>
          <div id="hud-lines" class="hud-item">LINES: 0</div>
          <div id="hud-score" class="hud-item">SCORE: 0</div>
          <div id="hud-time" class="hud-item">TIME: 10</div>
          <div id="hud-controls" class="hud-item hud-help">P: Pause</div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/lib/phaser.js"></script>

  <!-- poner todas los states antes que main.js -->
  <script src="js/game.js"></script>
  <script src="js/splash.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/credits.js"></script>
  <script src="js/hallFame.js"></script>

  <!--aquí el main js -->
  <script src="js/main.js"></script>

</body>

</html>
